[project]
name = "pytpo"
version = "0.1.3"
description = "A simple custom IDE."
requires-python = ">=3.11"
dependencies = [
    "pyside6",
    "pyte",
    "ruff",
    "pyflakes",
    "debugpy",
    "jedi",
    "markdown",
    "pygments",
    "pymdown-extensions",
    "pyspellchecker",
]

[project.scripts]
pytpo = "main:main"
pytpo-terminal = "Terminal.app:main"
pytpo-text-editor = "text_editor:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
