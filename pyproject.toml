[project]
name = "pytpo"
version = "0.1.3"
description = "A simple custom IDE."
requires-python = ">=3.11"
dependencies = [
    "pyside6",
    "pyte",
    "ruff",
    "pyflakes",
    "debugpy",
    "jedi",
    "markdown",
    "pygments",
    "pymdown-extensions",
    "pyspellchecker",
]

[project.scripts]
pytpo = "pytpo:main"
pytpo-terminal = "Terminal.app:main"
pytpo-text-editor = "text_editor:main"

[tool.setuptools]
py-modules = ["main", "terminal_app_main", "text_editor_main"]

[tool.setuptools.packages.find]
where = ["."]
include = [
    "pytpo*",
    "src*",
    "TPOPyside*",
    "Terminal*",
    "text_editor*",
    "DL_Manager*",
    "tdock*",
]
exclude = ["tests*", "test_projects*"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"
